[build]
  command = "pip install -r requirements.txt"
  publish = "public" # This is now the ONLY folder served as static

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 1. Prioritize real static files (CSS/JS)
[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

# 2. Route all other traffic to the Python Function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
