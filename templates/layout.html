<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpamShield | Intelligent Classification{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='premium.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block styles %}{% endblock %}
</head>
<body class="dark-mode"> <!-- Default to Dark Theme -->
    <header class="header_section">
        <div class="premium-container">
            <nav class="custom_nav-container" style="display: flex; justify-content: space-between; align-items: center;">
                <a class="navbar-brand" href="/"><span>SpamShield</span></a>
                <div style="display: flex; gap: 2rem; align-items: center;">
                    <a class="nav-link" href="/">Home</a>
                    <a class="nav-link" href="/about">Methodology</a>
                    <a class="nav-link" href="/index">Classifier</a>
                    <button id="theme-toggle" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;">
                        <i class="fas fa-sun" id="sun-icon"></i>
                        <i class="fas fa-moon" id="moon-icon" style="display:none;"></i>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="premium-container">
        {% block content %}{% endblock %}
        
        <footer style="margin-top: 5rem; text-align: center; color: var(--text-muted); font-size: 0.9rem; padding-bottom: 3rem; border-top: 1px solid var(--border-card); padding-top: 2rem;">
            <p>&copy; 2024 **SpamShield** | Intelligent Spam Email Classification System</p>
            <p style="margin-top: 0.5rem; opacity: 0.8;">Developed by: <strong>Gaurav Singh</strong> & <strong>Gyanendra Singh</strong></p>
        </footer>
    </main>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script>
        // Global Theme Toggle & Persistence Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        // Function to set theme and update icons
        function applyTheme(isLight) {
            if (isLight) {
                body.classList.add('light-mode');
                sunIcon.style.display = "none";
                moonIcon.style.display = "inline";
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-mode');
                sunIcon.style.display = "inline";
                moonIcon.style.display = "none";
                localStorage.setItem('theme', 'dark');
            }
        }

        // Initialize theme from localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            applyTheme(true);
        }

        themeToggle.addEventListener('click', function () {
            const isLightNow = !body.classList.contains('light-mode');
            applyTheme(isLightNow);
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
